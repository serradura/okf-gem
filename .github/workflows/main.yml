name: CI

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

# One job per gem, not a gem axis on one matrix: the gems in this repo do not
# share a Ruby floor (okf runs from 2.4, an MCP shell would start at 2.7, an
# FTS5 engine at 3.2), so a shared matrix would be mostly exclusions. A sibling
# gem is a new job block below — copy this one and change two strings.
jobs:
  okf:
    name: okf / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: okf
    strategy:
      fail-fast: false
      matrix:
        # The full support range: 2.4 is the floor (rack's own), newest is the
        # current stable. Rubies that predate ubuntu-latest's toolchain run on
        # the older image ruby/setup-ruby still builds them for.
        include:
          - { ruby: "2.4", os: ubuntu-22.04 }
          - { ruby: "2.5", os: ubuntu-22.04 }
          - { ruby: "2.6", os: ubuntu-22.04 }
          - { ruby: "2.7", os: ubuntu-latest }
          - { ruby: "3.0", os: ubuntu-latest }
          - { ruby: "3.1", os: ubuntu-latest }
          - { ruby: "3.2", os: ubuntu-latest }
          - { ruby: "3.3", os: ubuntu-latest }
          - { ruby: "3.4", os: ubuntu-latest }
          - { ruby: "4.0", os: ubuntu-latest }

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          # Its own input, not the job default: `defaults.run` only applies to
          # `run:` steps, and this action has to find the Gemfile itself to
          # cache against.
          working-directory: okf
      - name: Run the default task
        run: bundle exec rake

  # The Ruby that belongs to no gem — this repo's Rakefile and the Claude Code
  # plugin's curation hook — is linted by no gem's `rake rubocop`, so without
  # this job it is held to the 2.4 floor by comment only. One modern Ruby is
  # enough: RuboCop only installs from 2.7 up (see okf/Gemfile), and it is the
  # *target* version that does the checking, not the running one.
  lint:
    name: repo-level lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: okf
      - name: Lint the repo-level Ruby
        run: rake rubocop

# The graph page's Chromium suite (test/browser) is deliberately *not* here. It
# ran as a non-blocking job for several releases and failed 5 of its last 7 runs
# while the matrix above stayed green — the page boots against a CDN, so most of
# those were jsdelivr rather than the page. A job that is usually red teaches
# readers to ignore it, and a visitor to the repo reads the ✗ as "the gem is
# broken". It is a maintainer obligation run locally instead: see
# `rake test:browser` in AGENTS.md.
