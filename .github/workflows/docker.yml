name: docker

# Publishes the portable okf image to the GitHub Container Registry.
#
#   - on a v* tag (what `rake release` already pushes): build the multi-arch
#     image and push it as ghcr.io/serradura/okf:<version> + :latest.
#   - on a PR that touches the image: build amd64 only, no push, as a smoke test.
#   - manually (workflow_dispatch): publish the current okf/lib/okf/version.rb as
#     :<version> + :latest on demand, to ship the first image without a release.
#
# The bare `v*` tag series belongs to the base gem and keeps doing so in the
# monorepo — a sibling tags `okf-mcp/vX.Y.Z`, and this filter's `*` does not
# match across `/`, so only the gem this image ships can trigger it.
#
# The image is built from source (see Dockerfile), so the tag's commit already
# carries the right okf/lib/okf/version.rb — nothing here depends on RubyGems.

on:
  push:
    tags: [ "v*" ]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # arm64 support via emulation, plus BuildKit.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # On a tag the version comes from the ref; on a manual run, read it from the
      # gem so the dispatched image is still tagged (metadata-action's semver
      # patterns only fire on a tag ref).
      - name: Gem version
        id: ver
        run: echo "value=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' okf/lib/okf/version.rb | tr -d '"')" >> "$GITHUB_OUTPUT"

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/serradura/okf
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.ver.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}

      # No login (and no push) on PRs — the smoke-test build stays credential-free.
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
