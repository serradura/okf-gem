AllCops:
  # The gem runs on every Ruby back to 2.4 (rack's own floor) — RuboCop parses
  # with that version and flags newer-only syntax. CI's oldest job is the real
  # arbiter; this is the fast local check.
  TargetRubyVersion: 2.4
  NewCops: enable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

# House style: literal arrays read with breathing room — [ 1, 2 ].
Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: space

Layout/LineLength:
  Max: 160

# The codebase prefers explicit code over these opinions: prose-length methods
# in the CLI/linter, `+` concatenation, compact test-class names, and modifier
# ifs written out when the guard matters.
Metrics/AbcSize:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/ParameterLists:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/IfUnlessModifier:
  Enabled: false
Style/MultilineBlockChain:
  Enabled: false
# The cop's fix — `all?(Integer)` over `all? { |x| x.is_a?(Integer) }` — is the
# 2.5+ pattern-argument form, which raises ArgumentError on the 2.4 floor. Its
# advice is incompatible with this project, so the block form has to stand.
Style/PredicateWithKind:
  Enabled: false
Style/RegexpLiteral:
  Enabled: false
Style/Semicolon:
  Enabled: false
Style/StringConcatenation:
  Enabled: false

Lint/AmbiguousBlockAssociation:
  Exclude:
    - "test/**/*"

# A test file is a list of scenarios and the engine conformance suite is one
# module of them: length there is coverage, not complexity. ClassLength is off
# globally for the same reason — these two only bite because the shared suite is
# a module of `test` blocks rather than a class.
# inherit_mode keeps the cops' own defaults (gemspecs, Rakefiles) instead of
# replacing them — without it, excluding test/ would silently re-enable the cop
# on okf.gemspec.
# The Rakefile is here for the same reason as test/: a `namespace` block is a
# declarative list of the commands this project offers, so its length tracks how
# many there are and never how tangled any one of them is.
Metrics/BlockLength:
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - "test/**/*"
    - "Rakefile"
Metrics/ModuleLength:
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - "test/**/*"
